services:
  unplayable:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      # Set DATABASE_URL to your managed Postgres in production.
      # Leave it unset to use the local SQLite file in the mounted volume below.
      - DATABASE_URL=${DATABASE_URL:-}
    volumes:
      - ./data:/app/data
